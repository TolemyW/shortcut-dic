name: Release

on:
  push:
    tags: ['v*']

jobs:
  build:
    runs-on: macos-15
    strategy:
      matrix:
        arch: [arm64, x86_64]
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Build Release archive (${{ matrix.arch }})
        run: |
          xcodebuild archive \
            -project ShortcutDic.xcodeproj \
            -scheme ShortcutDic \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -archivePath build/ShortcutDic.xcarchive \
            ARCHS="${{ matrix.arch }}" \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}"

      - name: Export app and create zip
        run: |
          mkdir -p build/export
          cp -R build/ShortcutDic.xcarchive/Products/Applications/ShortcutDic.app build/export/
          cd build/export
          zip -r -y ../../ShortcutDic-${GITHUB_REF_NAME}-${{ matrix.arch }}.zip ShortcutDic.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ShortcutDic-${{ matrix.arch }}
          path: ShortcutDic-${{ github.ref_name }}-${{ matrix.arch }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Generate release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          cat > release-notes.md <<'STATIC'
          ## System Requirements

          - macOS 14.0 (Sonoma) or later
          - Accessibility permission (prompted on first launch)

          ## Downloads

          | File | Architecture |
          |------|-------------|
          STATIC
          sed -i 's/^          //' release-notes.md
          echo "| \`ShortcutDic-${TAG}-arm64.zip\` | Apple Silicon (M1/M2/M3/M4) |" >> release-notes.md
          echo "| \`ShortcutDic-${TAG}-x86_64.zip\` | Intel |" >> release-notes.md
          cat >> release-notes.md <<'STATIC'

          ## Installation

          1. Download the zip for your Mac's architecture above
          2. Unzip and move `ShortcutDic.app` to `/Applications`
          3. Launch and grant Accessibility permission when prompted
          STATIC
          sed -i 's/^          //' release-notes.md
          echo '' >> release-notes.md
          CHANGELOG=$(gh api "repos/${{ github.repository }}/releases/generate-notes" \
            -f tag_name="${TAG}" --jq '.body' 2>/dev/null || true)
          if [ -n "$CHANGELOG" ]; then
            echo "## What's Changed" >> release-notes.md
            echo "" >> release-notes.md
            echo "$CHANGELOG" >> release-notes.md
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "ShortcutDic ${{ github.ref_name }}" \
            --notes-file release-notes.md \
            ShortcutDic-${{ github.ref_name }}-arm64.zip \
            ShortcutDic-${{ github.ref_name }}-x86_64.zip
