name: Release

on:
  push:
    tags: ['v*']

jobs:
  build-and-release:
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Build Release archive
        run: |
          xcodebuild archive \
            -project ShortcutDic.xcodeproj \
            -scheme ShortcutDic \
            -configuration Release \
            -destination 'platform=macOS' \
            -archivePath build/ShortcutDic.xcarchive \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_ALLOWED=NO

      - name: Export app from archive
        run: |
          mkdir -p build/export
          cp -R build/ShortcutDic.xcarchive/Products/Applications/ShortcutDic.app build/export/

      - name: Create zip
        run: |
          cd build/export
          zip -r -y ../../ShortcutDic-${GITHUB_REF_NAME}.zip ShortcutDic.app

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "ShortcutDic ${GITHUB_REF_NAME}" \
            --generate-notes \
            ShortcutDic-${GITHUB_REF_NAME}.zip
