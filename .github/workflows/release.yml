name: Release

on:
  push:
    tags: ['v*']

jobs:
  build-and-release:
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Build Release archive (Universal)
        run: |
          xcodebuild archive \
            -project ShortcutDic.xcodeproj \
            -scheme ShortcutDic \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -archivePath build/ShortcutDic.xcarchive \
            ARCHS="arm64 x86_64" \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_ALLOWED=NO

      - name: Export app from archive
        run: |
          mkdir -p build/export
          cp -R build/ShortcutDic.xcarchive/Products/Applications/ShortcutDic.app build/export/

      - name: Create zip
        run: |
          cd build/export
          zip -r -y ../../ShortcutDic-${GITHUB_REF_NAME}.zip ShortcutDic.app

      - name: Generate release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CHANGELOG=$(gh api repos/${{ github.repository }}/releases/generate-notes \
            -f tag_name="${GITHUB_REF_NAME}" --jq '.body' 2>/dev/null || echo "")
          cat > release-notes.md <<NOTES
          ## System Requirements

          - **OS**: macOS 14.0 (Sonoma) or later
          - **Architecture**: Apple Silicon (M1/M2/M3/M4) and Intel (Universal Binary)
          - **Permissions**: Accessibility access required (prompted on first launch)

          ## Installation

          1. Download \`ShortcutDic-${GITHUB_REF_NAME}.zip\` below
          2. Unzip and move \`ShortcutDic.app\` to \`/Applications\`
          3. Launch and grant Accessibility permission when prompted

          ${CHANGELOG:+## What's Changed

          $CHANGELOG}
          NOTES
          sed -i '' 's/^          //' release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "ShortcutDic ${GITHUB_REF_NAME}" \
            --notes-file release-notes.md \
            ShortcutDic-${GITHUB_REF_NAME}.zip
