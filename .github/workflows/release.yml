name: Release

on:
  push:
    tags: ['v*']

jobs:
  build-and-release:
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Build Release archive (Universal)
        run: |
          xcodebuild archive \
            -project ShortcutDic.xcodeproj \
            -scheme ShortcutDic \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -archivePath build/ShortcutDic.xcarchive \
            ARCHS="arm64 x86_64" \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}"

      - name: Export app from archive
        run: |
          mkdir -p build/export
          cp -R build/ShortcutDic.xcarchive/Products/Applications/ShortcutDic.app build/export/

      - name: Create zip
        run: |
          cd build/export
          zip -r -y ../../ShortcutDic-${GITHUB_REF_NAME}.zip ShortcutDic.app

      - name: Generate release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          cat > release-notes.md <<'STATIC'
          ## System Requirements

          - macOS 14.0 (Sonoma) or later
          - Apple Silicon (M1/M2/M3/M4) and Intel (Universal Binary)
          - Accessibility permission (prompted on first launch)

          ## Installation

          STATIC
          sed -i '' 's/^          //' release-notes.md
          echo "1. Download \`ShortcutDic-${TAG}.zip\` below" >> release-notes.md
          echo '2. Unzip and move `ShortcutDic.app` to `/Applications`' >> release-notes.md
          echo '3. Launch and grant Accessibility permission when prompted' >> release-notes.md
          echo '' >> release-notes.md
          CHANGELOG=$(gh api "repos/${{ github.repository }}/releases/generate-notes" \
            -f tag_name="${TAG}" --jq '.body' 2>/dev/null || true)
          if [ -n "$CHANGELOG" ]; then
            echo "## What's Changed" >> release-notes.md
            echo "" >> release-notes.md
            echo "$CHANGELOG" >> release-notes.md
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "ShortcutDic ${GITHUB_REF_NAME}" \
            --notes-file release-notes.md \
            ShortcutDic-${GITHUB_REF_NAME}.zip
