name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Build
        run: |
          xcodebuild build \
            -project ShortcutDic.xcodeproj \
            -scheme ShortcutDic \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="-"

      - name: Test
        run: |
          xcodebuild test \
            -project ShortcutDic.xcodeproj \
            -scheme ShortcutDic \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="-" \
            -resultBundlePath TestResults.xcresult

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults.xcresult
